<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AgRup Media | Mobile Ansicht</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png?v=1">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png?v=1">
  <style>
    :root {
      --gold: #c89542;
      --gold2: #f2c879;
      --white: #ffffff;
      --line: rgba(255, 255, 255, .12);
      --premium-black: #020202;
      --premium-gold-glow: rgba(242, 200, 121, .080);
      --premium-grain-opacity: .075;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(ellipse at 18% 6%, var(--premium-gold-glow), transparent 38%),
        radial-gradient(ellipse at 84% 24%, rgba(255, 255, 255, .028), transparent 36%),
        radial-gradient(ellipse at 72% 88%, rgba(200, 149, 66, .045), transparent 50%),
        linear-gradient(180deg, #030303, #070706 48%, var(--premium-black));
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(ellipse at center, transparent 0%, transparent 58%, rgba(0, 0, 0, .62) 100%),
        radial-gradient(circle at 21% 29%, rgba(255, 255, 255, .10) 0 .42px, transparent .72px),
        radial-gradient(circle at 73% 63%, rgba(242, 200, 121, .08) 0 .34px, transparent .68px);
      background-size: auto, 4px 4px, 5px 5px;
      opacity: var(--premium-grain-opacity);
      mix-blend-mode: screen;
    }

    .mobile-preview {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .preview-shell {
      width: min(430px, 100%);
      display: grid;
      gap: 14px;
    }

    .preview-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
      font-weight: 850;
    }

    .preview-brand {
      color: var(--gold2);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 11px;
      font-weight: 950;
    }

    .preview-size {
      color: rgba(255, 255, 255, .52);
    }

    .phone-frame {
      position: relative;
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100dvh - 88px));
      min-height: 620px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(242, 200, 121, .34);
      border-radius: 34px;
      background:
        radial-gradient(ellipse at 18% 0%, rgba(242, 200, 121, .055), transparent 42%),
        radial-gradient(ellipse at 82% 72%, rgba(255, 255, 255, .020), transparent 46%),
        #020202;
      box-shadow:
        0 28px 80px rgba(0, 0, 0, .58),
        0 0 38px rgba(200, 149, 66, .14);
    }

    .phone-frame::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      z-index: 2;
      width: 96px;
      height: 22px;
      border-radius: 999px;
      background: #050505;
      transform: translateX(-50%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
      pointer-events: none;
    }

    .mobile-site {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #000;
    }

    @media (max-width: 700px) {
      html,
      body {
        background:
          radial-gradient(ellipse at 16% 8%, rgba(242, 200, 121, .070), transparent 42%),
          radial-gradient(ellipse at 82% 64%, rgba(255, 255, 255, .018), transparent 48%),
          linear-gradient(180deg, #030303, #020202);
      }

      .mobile-preview {
        display: block;
        padding: 0;
      }

      .preview-shell {
        width: 100%;
        min-height: 100dvh;
      }

      .preview-topbar {
        display: none;
      }

      .phone-frame {
        width: 100vw;
        max-width: none;
        height: 100dvh;
        min-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .phone-frame::before {
        display: none;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/language-chatbot.css?v=2">
  <script src="assets/language-chatbot.js?v=1" defer></script>
</head>
<body>
  <main class="mobile-preview" aria-label="Mobile Ansicht von AgRup Media">
    <div class="preview-shell">
      <div class="preview-topbar" aria-hidden="true">
        <span class="preview-brand">AgRup Media</span>
        <span class="preview-size">Mobile Ansicht 390 × 844</span>
      </div>
      <div class="phone-frame">
        <iframe class="mobile-site" src="./projekte/index.html" title="AgRup Media Projektseite in mobiler Ansicht"></iframe>
      </div>
    </div>
  </main>
</body>
</html>
